<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bachelor & Bachelorette Collection - Steven K Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sage-green: #8b9d83;
            --forest-green: #4a5d4a;
            --warm-tan: #d4c5b0;
            --cream: #f5f2ed;
            --text-dark: #2d2d2d;
            --text-light: #666;
            --serif: 'Libre Baskerville', serif;
            --sans: 'Work Sans', sans-serif;
        }

        body {
            font-family: var(--sans);
            background-color: var(--cream);
            color: var(--text-dark);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(245, 242, 237, 0.98);
            z-index: 1000;
            padding: 1.5rem 5%;
            border-bottom: 1px solid rgba(139, 157, 131, 0.15);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--forest-green);
            text-decoration: none;
        }

        .back-link {
            color: var(--sage-green);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link:hover {
            color: var(--forest-green);
        }

        /* Header */
        .collection-header {
            padding: 10rem 5% 5rem;
            text-align: center;
            background: white;
        }

        .collection-header h1 {
            font-family: var(--serif);
            font-size: 4rem;
            color: var(--forest-green);
            margin-bottom: 1rem;
        }

        .collection-header p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 5%;
        }

        .event-section {
            margin-bottom: 6rem;
        }

        .event-title {
            font-family: var(--serif);
            font-size: 2rem;
            color: var(--forest-green);
            margin-bottom: 3rem;
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            aspect-ratio: 3/4;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        @media (max-width: 768px) {
            .collection-header h1 {
                font-size: 2.5rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">stevenkmedia</a>
            <a href="index.html#collections" class="back-link">← Back to Collections</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="collection-header">
        <h1>Bachelor & Bachelorette Collection</h1>
        <p>Authentic displays of joy, love, and communion</p>
    </div>

    <!-- Gallery Container -->
    <div class="gallery-container">
        
        <!-- Event 1 -->
        <div class="event-section">
            <h2 class="event-title">Jessica's Bachelorette Party - Summer 2024</h2>
            <div class="gallery-grid">
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event1-1.jpg" alt="Bachelorette Photo 1">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event1-2.jpg" alt="Bachelorette Photo 2">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event1-3.jpg" alt="Bachelorette Photo 3">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event1-4.jpg" alt="Bachelorette Photo 4">
                </div>
                <!-- Add more photos as needed -->
            </div>
        </div>

        <!-- Event 2 -->
        <div class="event-section">
            <h2 class="event-title">Mike's Bachelor Party - Spring 2024</h2>
            <div class="gallery-grid">
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event2-1.jpg" alt="Bachelor Photo 1">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event2-2.jpg" alt="Bachelor Photo 2">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event2-3.jpg" alt="Bachelor Photo 3">
                </div>
                <div class="gallery-item" onclick="openLightbox(this)">
                    <img src="images/bachelor-event2-4.jpg" alt="Bachelor Photo 4">
                </div>
                <!-- Add more photos as needed -->
            </div>
        </div>

        <!-- Add more events as needed -->
        
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        function openLightbox(element) {
            const img = element.querySelector('img');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        // Close lightbox on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
